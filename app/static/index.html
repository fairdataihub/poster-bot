<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>posterbot — ask the posters.science corpus</title>
<style>
  :root { --bg:#F7F9FB; --panel:#EDF2F7; --ink:#1F2B36; --muted:#57687A;
          --accent:#33628F; --hair:#D6DFE8; --ok:#2F7D4F; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#131C24; --panel:#1B2833; --ink:#DCE6EF; --muted:#93A5B5;
            --accent:#7FAEDC; --hair:#2C3B48; --ok:#6FBE8F; } }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif; }
  .wrap { max-width:820px; margin:0 auto; padding:18px 14px 120px; }
  header { display:flex; align-items:baseline; gap:10px; border-bottom:1px solid var(--hair);
           padding-bottom:10px; margin-bottom:16px; flex-wrap:wrap; }
  header h1 { font-size:20px; margin:0; }
  header .sub { color:var(--muted); font-size:13px; }
  .msg { margin:14px 0; }
  .msg .who { font-size:11px; letter-spacing:.08em; text-transform:uppercase;
              color:var(--muted); margin-bottom:4px; }
  .msg.user .body { background:var(--panel); border:1px solid var(--hair);
                    border-radius:10px; padding:10px 14px; display:inline-block; }
  .msg.bot .body { white-space:pre-wrap; }
  .msg.bot .body a.cite { color:var(--accent); text-decoration:none; font-weight:600; }
  .sources { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
             gap:8px; margin-top:10px; }
  .card { border:1px solid var(--hair); border-radius:8px; padding:9px 11px;
          background:var(--panel); font-size:13px; }
  .card .n { color:var(--accent); font-weight:700; margin-right:4px; }
  .card a { color:var(--accent); text-decoration:none; }
  .card a:hover { text-decoration:underline; }
  .card .meta { color:var(--muted); font-size:11.5px; margin-top:4px; }
  form { position:fixed; left:0; right:0; bottom:0; background:var(--bg);
         border-top:1px solid var(--hair); padding:12px 14px 16px; }
  .row { max-width:820px; margin:0 auto; display:flex; gap:8px; }
  textarea { flex:1; resize:none; height:52px; border:1px solid var(--hair);
             border-radius:10px; padding:12px 14px; font:inherit;
             background:var(--panel); color:var(--ink); }
  button { border:0; border-radius:10px; padding:0 22px; font:600 15px system-ui;
           background:var(--accent); color:#fff; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .note { max-width:820px; margin:6px auto 0; color:var(--muted); font-size:11.5px; }
  .status { color:var(--muted); font-size:13px; font-style:italic; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>posterbot</h1>
    <span class="sub">semantic search + chat over 31k scientific posters · posters.science · BOSC/CoFest 2026</span>
  </header>
  <div id="log"></div>
</div>
<form id="f">
  <div class="row">
    <textarea id="q" placeholder="Ask about the poster corpus — topics, methods, tools, authors…" maxlength="2000"></textarea>
    <button id="send" type="submit">Ask</button>
  </div>
  <div class="note">Answers are AI-generated from OCR-extracted public poster metadata — verify via the linked DOIs. Full text shown only for openly-licensed posters.</div>
</form>
<script>
"use strict";
const log = document.getElementById("log");
const form = document.getElementById("f");
const qEl = document.getElementById("q");
const sendBtn = document.getElementById("send");
const history = [];

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;   // escape-by-default, always
  return e;
}

function addUser(text) {
  const m = el("div", "msg user");
  m.append(el("div", "who", "you"), el("div", "body", text));
  log.append(m);
}

function renderSources(container, items) {
  const grid = el("div", "sources");
  items.forEach((it, i) => {
    const c = el("div", "card");
    c.id = "src-" + (i + 1);
    const t = el("div");
    t.append(el("span", "n", "[" + (i + 1) + "]"));
    if (it.url) {
      const a = el("a", null, it.title || "(untitled)");
      a.href = it.url; a.target = "_blank"; a.rel = "noopener";
      t.append(a);
    } else {
      t.append(el("span", null, it.title || "(untitled)"));
    }
    c.append(t);
    const bits = [];
    if (it.year) bits.push(it.year);
    if (it.conference) bits.push(it.conference);
    if (it.similarity) bits.push("sim " + it.similarity.toFixed(2));
    if (it.license_class !== "allowed") bits.push("abstract-only");
    c.append(el("div", "meta", bits.join(" · ")));
    grid.append(c);
  });
  container.append(grid);
}

function linkifyCitations(bodyEl, nSources) {
  const raw = bodyEl.textContent;
  bodyEl.textContent = "";
  const parts = raw.split(/(\[\d+\])/);
  for (const p of parts) {
    const m = p.match(/^\[(\d+)\]$/);
    const n = m ? parseInt(m[1], 10) : 0;
    if (n >= 1 && n <= nSources) {
      const a = el("a", "cite", p);
      a.href = "#src-" + n;
      bodyEl.append(a);
    } else {
      bodyEl.append(document.createTextNode(p));
    }
  }
}

async function ask(q) {
  addUser(q);
  const m = el("div", "msg bot");
  m.append(el("div", "who", "posterbot"));
  const body = el("div", "body");
  const status = el("div", "status", "searching 31k posters…");
  m.append(status, body);
  log.append(m);
  window.scrollTo(0, document.body.scrollHeight);

  let nSources = 0;
  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ q, history: history.slice(-6) }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      status.textContent = err.error || ("error " + resp.status);
      return;
    }
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const events = buf.split("\n\n");
      buf = events.pop();
      for (const ev of events) {
        if (!ev.startsWith("data: ")) continue;
        const d = JSON.parse(ev.slice(6));
        if (d.type === "sources") {
          nSources = d.items.length;
          status.textContent = nSources ? "generating…" : "";
          renderSources(m, d.items);
          m.append(body);                       // keep answer under the cards
        } else if (d.type === "delta") {
          body.textContent += d.text;
          window.scrollTo(0, document.body.scrollHeight);
        } else if (d.type === "done") {
          status.remove();
          linkifyCitations(body, nSources);
        }
      }
    }
    history.push({ role: "user", content: q },
                 { role: "assistant", content: body.textContent.slice(0, 1500) });
  } catch (e) {
    status.textContent = "connection lost — try again";
  }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const q = qEl.value.trim();
  if (!q) return;
  qEl.value = "";
  sendBtn.disabled = true;
  await ask(q);
  sendBtn.disabled = false;
  qEl.focus();
});
qEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
});
</script>
</body>
</html>
